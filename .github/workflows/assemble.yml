name: Assemble book

on:
  push:
    branches: [main]
    paths:
      - 'chapter_*.md'

jobs:
  assemble:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Concatenate chapters
        run: |
          : > architecting-ai-agents.md
          for f in $(ls chapter_*.md | sort); do
            cat "$f" >> architecting-ai-agents.md
            echo -e "\n\n" >> architecting-ai-agents.md
          done

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install md-to-pdf
        run: npm install -g md-to-pdf

      - name: Convert to PDF
        run: md-to-pdf architecting-ai-agents.md --stylesheet book.css  --launch-options '{"args":["--no-sandbox","--disable-setuid-sandbox"]}'

      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add architecting-ai-agents.md architecting-ai-agents.pdf
          git diff --staged --quiet || git commit -m "Build architecting-ai-agents.md from chapters and convert to PDF"
          git push